services:
  backend:
    build:
      context: ./backend
    environment:
      PORT: 8000
      YOUTUBE_API_KEY: ${YOUTUBE_API_KEY:-}
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_HTTP_REFERER: ${LLM_HTTP_REFERER:-http://localhost:8000}
      REDIS_URL: ${REDIS_URL:-redis://localhost:6379}
      FRONTEND_URL: http://localhost:8080
      FRONTEND_URLS: http://localhost:8080,http://localhost:5173
      FRONTEND_ORIGIN_REGEX: ${FRONTEND_ORIGIN_REGEX:-}
      SUPABASE_URL: ${SUPABASE_URL:-}
      SUPABASE_KEY: ${SUPABASE_KEY:-}
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: http://localhost:8000
        VITE_SUPABASE_URL: ${VITE_SUPABASE_URL:-}
        VITE_SUPABASE_PUBLISHABLE_DEFAULT_KEY: ${VITE_SUPABASE_PUBLISHABLE_DEFAULT_KEY:-}
    ports:
      - "8080:80"
    depends_on:
      - backend
